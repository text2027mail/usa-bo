name: Box Office Scraper

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
    - cron: '0 3 * * *'     # 3 AM daily
    - cron: '0 4 * * *'     # 4 AM daily
  workflow_dispatch:        # allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (main repo)
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run boxoffice scraper (with retries)
        env:
          RENDER_SEATMAP_URL: ${{ secrets.RENDER_SEATMAP_URL }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          for i in 1 2 3; do
            echo "Attempt $i to run scraper..."
            python usa-boxoffice.py && break
            if [ $i -lt 3 ]; then sleep 10; else exit 1; fi
          done

      # No git commit/push step – the script writes data directly to the remote repo via GitHub API.
