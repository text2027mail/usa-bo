name: Advance Booking Scraper

on:
  schedule:
    - cron: '0 */5 * * *'
    - cron: '0 3 * * *'
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run advance scraper (retry 3 times)
        run: |
          for i in 1 2 3; do
            echo "Attempt $i to run scraper..."
            python usa-advance.py && break
            if [ $i -lt 3 ]; then sleep 10; else exit 1; fi
          done

      - name: Commit and push changes (retry 3 times)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add usa-advance/
          git commit -m "Update advance data" || echo "No changes to commit"
          for i in 1 2 3; do
            echo "Push attempt $i..."
            git push origin HEAD:main --force && break
            if [ $i -lt 3 ]; then
              echo "Push failed, retrying in 10 seconds..."
              sleep 10
            else
              echo "All 3 push attempts failed."
              exit 1
            fi
          done
