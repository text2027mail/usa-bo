name: Box Office Scraper

on:
  schedule:
    # Every 3 hours (0, 3, 6, 9, 12, 15, 18, 21 UTC)
    - cron: '0 */3 * * *'
    # Extra runs to cover 11 PM EDT/EST
    - cron: '0 3 * * *'
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run boxoffice scraper
        run: python boxoffice.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add usa-boxoffice/
          git commit -m "Update boxoffice data" || echo "No changes to commit"
          git push origin HEAD:main --force
