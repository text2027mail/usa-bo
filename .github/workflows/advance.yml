name: Advance Booking Scraper

on:
  schedule:
    # Every 5 hours (0, 5, 10, 15, 20 UTC)
    - cron: '0 */5 * * *'
    # Extra runs to cover 11 PM EDT (03:00 UTC) and 11 PM EST (04:00 UTC)
    - cron: '0 3 * * *'
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run advance scraper (retry 3 times)
        run: |
          for i in {1..3}; do
            echo "Attempt $i..."
            python usa_advance.py && break
            if [ $i -lt 3 ]; then
              echo "Retrying in 10 seconds..."
              sleep 10
            else
              echo "All 3 attempts failed."
              exit 1
            fi
          done

      - name: Commit and push changes (force)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add usa-advance/
          git commit -m "Update advance data" || echo "No changes to commit"
          git push origin HEAD:main --force
